<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עורך תבנית סקר</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F5F5F0;--surface:#fff;--border:#E5E7EB;--text:#1a1a1a;--text2:#6B7280;--text3:#9CA3AF;--accent:#4F46E5;--green:#2D7A4F;--orange:#E8603C;--red:#DC2626;--r:12px;}
body{font-family:'Helvetica Neue',Arial,sans-serif;direction:rtl;background:var(--bg);min-height:100vh;display:flex;}

/* EDITOR */
.editor-panel{width:380px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.ep-head{padding:16px 18px;border-bottom:1px solid var(--border);background:#FAFAFA;}
.ep-head h2{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ep-head p{font-size:11px;color:var(--text3);}
.ep-body{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.ep-sec label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px;}
.ep-inp{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;color:var(--text);outline:none;background:#FAFAFA;}
.ep-inp:focus{border-color:var(--accent);background:var(--surface);}
.divider{height:1px;background:var(--border);}

/* Question cards */
.q-list{display:flex;flex-direction:column;gap:10px;}
.q-card{background:#FAFAFA;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.q-card-head{padding:9px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:white;}
.q-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-type-sel{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:20px;font-family:inherit;outline:none;cursor:pointer;background:white;color:var(--text);}
.q-rm{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center;margin-right:auto;}
.q-rm:hover{background:#FEE2E2;color:var(--red);border-color:#FECACA;}
.q-fields{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.q-fields input,.q-fields select{width:100%;padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;outline:none;background:white;color:var(--text);}
.q-fields input:focus{border-color:var(--accent);}
.q-fields label{font-size:11px;color:var(--text2);}
.icon-row{display:flex;gap:4px;}
.icon-row input{flex:1;}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:16px;flex-shrink:0;}
.opts-list{display:flex;flex-direction:column;gap:4px;}
.opt-row{display:flex;gap:4px;}
.opt-row input{flex:1;padding:5px 9px;font-size:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;outline:none;background:white;}
.opt-rm{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:11px;}
.opt-rm:hover{background:#FEE2E2;color:var(--red);}
.add-opt{padding:4px 10px;font-size:11px;border:1px dashed #C7D2FE;border-radius:8px;background:none;color:var(--accent);cursor:pointer;font-family:inherit;}
.rating-row{display:flex;gap:6px;align-items:center;}
.rating-row select{width:80px;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;outline:none;background:white;}
.req-row{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid #F3F4F6;margin-top:2px;}
.req-row span{font-size:11px;color:var(--text2);}
.tog{position:relative;display:inline-block;width:30px;height:17px;cursor:pointer;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.togs{position:absolute;inset:0;border-radius:17px;background:#D1D5DB;transition:.15s;}
.togs:before{content:'';position:absolute;height:11px;width:11px;right:3px;top:3px;background:white;border-radius:50%;transition:.15s;}
.tog input:checked+.togs{background:var(--accent);}
.tog input:checked+.togs:before{transform:translateX(-13px);}

.add-q-wrap{display:flex;flex-direction:column;gap:5px;}
.add-type-grid{display:flex;flex-wrap:wrap;gap:5px;display:none;}
.add-type-grid.open{display:flex;}
.at-btn{padding:5px 11px;font-size:11px;border:1px solid var(--border);border-radius:20px;background:white;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .1s;}
.at-btn:hover{border-color:var(--accent);color:var(--accent);}
.add-btn{width:100%;padding:8px;font-size:12px;border:1.5px dashed #C7D2FE;border-radius:var(--r);background:none;color:var(--accent);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
.add-btn:hover{background:var(--accent);color:white;border-color:var(--accent);}

.ep-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
.btn{flex:1;padding:9px;font-size:12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-weight:500;}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn.primary:hover{background:#4338CA;}

/* PREVIEW */
.preview-panel{flex:1;background:var(--bg);padding:24px;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;}
.phone-wrap{width:375px;background:var(--surface);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column;}
.phone-bar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;}
.pbar-step{font-size:11px;color:var(--text3);}
.pbar-dots{display:flex;gap:4px;margin-right:auto;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.pdot.active{background:var(--accent);}
.phone-content{padding:20px 16px 8px;}
.pv-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:3px;}
.pv-sub{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.pv-time{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#F5F5F0;border-radius:20px;font-size:12px;color:var(--text2);margin-bottom:16px;border:1px solid var(--border);}

/* Survey question types */
.pv-q{background:#F8F8F6;border-radius:14px;padding:16px;margin-bottom:12px;}
.pv-q-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.pv-q-sub{font-size:12px;color:var(--text3);margin-bottom:10px;}
.pv-required{font-size:10px;color:var(--red);margin-bottom:6px;}

/* Stars */
.stars{display:flex;gap:6px;direction:ltr;justify-content:flex-end;}
.star{font-size:28px;cursor:pointer;color:#D1D5DB;transition:color .1s;}
.star.active{color:#F59E0B;}

/* Scale 1-10 */
.scale-btns{display:flex;gap:3px;flex-wrap:wrap;}
.scale-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .1s;display:flex;align-items:center;justify-content:center;}
.scale-btn:hover{border-color:var(--accent);color:var(--accent);}
.scale-btn.sel{background:var(--accent);color:white;border-color:var(--accent);}
.scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;}

/* NPS */
.nps-btns{display:flex;gap:2px;}
.nps-btn{flex:1;height:32px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .1s;border-radius:6px;}
.nps-btn:hover{border-color:var(--accent);}
.nps-btn.sel{background:var(--accent);color:white;border-color:var(--accent);}

/* Radio / Checkbox */
.choices{display:flex;flex-direction:column;gap:6px;}
.choice-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .1s;background:white;}
.choice-item:hover{border-color:var(--accent);}
.choice-item.sel{border-color:var(--accent);background:#EEF2FF;}
.choice-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.choice-item.sel .choice-circle{border-color:var(--accent);background:var(--accent);}
.choice-circle-inner{width:8px;height:8px;border-radius:50%;background:white;}
.choice-square{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.choice-item.sel .choice-square{border-color:var(--accent);background:var(--accent);}
.choice-text{font-size:13px;color:var(--text);}

/* Text */
.pv-textarea{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:10px;font-family:inherit;outline:none;resize:none;min-height:72px;direction:rtl;background:white;}
.pv-textarea:focus{border-color:var(--accent);}

.valid-bar{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--red);display:none;}
.phone-footer{padding:12px 16px 20px;border-top:1px solid var(--border);}
.pv-action-btn{width:100%;padding:16px;font-size:16px;font-weight:600;border-radius:50px;border:none;background:var(--orange);color:white;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.pv-back{display:block;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-box{background:white;border-radius:14px;padding:22px 24px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.15);}
.modal-box h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;}
.modal-inp{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:10px;font-family:inherit;outline:none;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.m-cancel{flex:1;padding:8px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-family:inherit;}
.m-ok{flex:1;padding:8px;font-size:13px;border-radius:10px;border:none;background:var(--accent);color:white;cursor:pointer;font-family:inherit;font-weight:500;}
.saved-list{max-height:200px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
.saved-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;}
.si-load{padding:3px 10px;font-size:11px;border-radius:20px;border:none;background:var(--accent);color:white;cursor:pointer;}
.si-del{padding:3px 8px;font-size:11px;border-radius:20px;border:1px solid #FECACA;background:#FEF2F2;color:var(--red);cursor:pointer;}

.toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:#111;color:white;font-size:12px;padding:7px 18px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
<script src="synel-db.js"></script>
<script src="synel-validation.js"></script>
<script src="synel-autosave.js"></script>
<script src="synel-accessibility.js"></script>
<script src="synel-versions.js"></script>
<script src="synel-mobile.js"></script>
<script src="synel-brand.js"></script>
<script src="synel-nav.js"></script>
<script src="synel-publish.js"></script>
</head>
<body>

<div class="editor-panel">
  <div class="ep-head">
    <h2>📊 עורך תבנית סקר</h2>
    <p>דירוג כוכבים, סקאלה, NPS, בחירה, טקסט</p>
  </div>
  <div class="ep-body">
    <div class="ep-sec">
      <label>שם הסקר</label>
      <div class="icon-row">
        <input class="ep-inp" id="fName" value="ראיון עזיבה" oninput="render()">
        <button class="icon-btn" onclick="showIconPicker(document.getElementById('fIcon'))">😀</button>
        <input class="ep-inp" id="fIcon" style="width:50px;text-align:center;" placeholder="🎯" oninput="render()">
      </div>
    </div>
    <div class="ep-sec">
      <label>תת-כותרת</label>
      <input class="ep-inp" id="fSub" value="המשוב שלך עוזר לנו להשתפר. כל התשובות חסויות." oninput="render()">
    </div>
    <div class="ep-sec">
      <label>זמן משוער (דקות)</label>
      <input class="ep-inp" id="fTime" value="2" style="width:80px;" oninput="render()">
    </div>
    <div class="divider"></div>
    <div class="ep-sec">
      <label>שאלות</label>
      <div class="q-list" id="qList"></div>
      <div class="add-q-wrap">
        <div class="add-type-grid" id="addGrid">
          <button class="at-btn" onclick="addQ('stars')">⭐ כוכבים</button>
          <button class="at-btn" onclick="addQ('scale')">📊 סקאלה 1-10</button>
          <button class="at-btn" onclick="addQ('nps')">📈 NPS</button>
          <button class="at-btn" onclick="addQ('radio')">🔘 בחירה אחת</button>
          <button class="at-btn" onclick="addQ('checkbox')">☑️ בחירה מרובה</button>
          <button class="at-btn" onclick="addQ('text')">📝 טקסט חופשי</button>
        </div>
        <button class="add-btn" onclick="document.getElementById('addGrid').classList.toggle('open')">+ הוסף שאלה</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="ep-sec">
      <label>טקסט כפתור</label>
      <input class="ep-inp" id="fBtn" value="שלח ותודה ←" oninput="render()">
    </div>
    <div class="ep-sec">
      <label>שיוך לתהליך</label>
      <select class="ep-inp" id="fProcess" onchange="updateAssign()">
        <option value="">— בחר —</option>
        <option value="onboarding">🚀 Onboarding</option>
        <option value="offboarding" selected>🚪 Offboarding</option>
        <option value="lifecycle">🔄 Life Cycle</option>
      </select>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <label style="font-size:11px;color:var(--text2);">שלב</label>
      <input class="ep-inp" id="fStepCur" type="number" value="5" style="width:55px;" oninput="updateAssign()">
      <span style="font-size:12px;color:var(--text3);">מתוך</span>
      <input class="ep-inp" id="fStepTotal" type="number" value="6" style="width:55px;" oninput="updateAssign()">
    </div>
    <div id="assignSummary" style="display:none;background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px 12px;font-size:11px;color:#065F46;line-height:1.8;"></div>
  </div>
  
    <div class="divider"></div>

    <div class="ep-sec">
      <label>עובד אחראי</label>
      <select class="ep-inp" id="fOwner" onchange="updateAssign && updateAssign()">
        <option value="">-- לא הוגדר --</option>
        <option value="hr">HR</option>
        <option value="manager">מנהל ישיר</option>
        <option value="it">IT</option>
        <option value="payroll">חשב שכר</option>
      </select>
    </div>
  
    <div class="divider"></div>

    <div class="ep-sec">
      <label>אישור סיום</label>
      <div class="tog-row" style="margin-bottom:6px;">
        <span>חתימה דיגיטלית</span>
        <label class="tog"><input type="checkbox" id="hasSigOpt" onchange="updateConfirmType()"><span class="togs"></span></label>
      </div>
      <div class="tog-row">
        <span>צ'קבוקס "קראתי והבנתי"</span>
        <label class="tog"><input type="checkbox" id="hasCheckOpt" checked onchange="updateConfirmType()"><span class="togs"></span></label>
      </div>
      <input class="ep-inp" id="confirmOptText" value="קראתי והבנתי" oninput="updateConfirmType()" style="margin-top:6px;">
    </div>
  
    <!-- DB FIELD MAPPING SECTION -->
    <div class="ep-sec" id="dbMappingSection" style="margin-top:8px;">
      <label style="font-size:11px;font-weight:600;color:#6B7280;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px;">מיפוי שדות DB</label>
      <div id="dbMappingList" style="display:flex;flex-direction:column;gap:5px;"></div>
      <button onclick="addDBMapping()" style="width:100%;padding:6px;font-size:11px;border:1.5px dashed #C7D2FE;border-radius:8px;background:none;color:#4F46E5;cursor:pointer;font-family:inherit;margin-top:4px;">+ הוסף שיוך שדה DB</button>
    </div>

<div class="ep-footer">
    <button class="btn" onclick="saveForm()">💾 שמור</button>
    <button class="btn" onclick="saveAs()">📋 שמור בשם</button>
    <button class="btn" style="width:100%;background:#1e1b4b;color:white;border-color:#1e1b4b;" onclick="exportJSON()">{ } ייצא JSON</button>
    <button class="btn" style="width:100%;font-size:11px;" onclick="openLoad()">📂 טפסים שמורים</button>
  </div>
</div>

<div class="preview-panel">
  <div class="phone-wrap">
    <div class="phone-bar">
      <span class="pbar-step" id="stepLbl">שלב 5 מתוך 6</span>
      <div class="pbar-dots" id="pbarDots"></div>
    </div>
    <div class="phone-content" id="phoneContent"></div>
    <div class="phone-footer">
      <div class="valid-bar" id="validBar"></div>
      <button class="pv-action-btn" id="actionBtn" onclick="submitForm()">שלח ותודה ←</button>
      <span class="pv-back">חזרה לרשימה</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="saveAsModal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box"><h3>📋 שמור בשם</h3>
    <input class="modal-inp" id="saveAsName" onkeydown="if(event.key==='Enter')confirmSaveAs()">
    <div class="modal-btns"><button class="m-cancel" onclick="document.getElementById('saveAsModal').style.display='none'">ביטול</button><button class="m-ok" onclick="confirmSaveAs()">שמור ✓</button></div>
  </div>
</div>
<div class="modal-overlay" id="loadModal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box" style="width:400px;"><h3>📂 טפסים שמורים</h3>
    <div class="saved-list" id="savedList"></div>
    <button class="m-cancel" style="width:100%;" onclick="document.getElementById('loadModal').style.display='none'">סגור</button>
  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
var questions=[
  {type:'radio',   text:'מה הסיבה העיקרית לעזיבה?', icon:'❓', subtext:'', required:true,  opts:['הזדמנות מקצועית טובה יותר','שכר ותנאים','ניהול ויחסים בעבודה','איזון בית-עבודה','מעבר גיאוגרפי','אחר']},
  {type:'stars',   text:'איך היית מדרגת את החוויה שלך בסינאל בסך הכל?', icon:'⭐', subtext:'', required:true,  stars:5, selStar:0},
  {type:'scale',   text:'מה אנחנו יכולים לשפר?', icon:'📊', subtext:'', required:false, scaleMax:10, scaleLow:'כלום', scaleHigh:'הכל', selScale:null},
  {type:'text',    text:'מילים אחרונות שתרצה/י להוסיף?', icon:'💬', subtext:'אופציונלי. ההערות נשלחות ל-HR בלבד.', required:false, placeholder:'כל דבר שתרצה/י לשתף...'},
];

var TYPE_LABELS={stars:'⭐ כוכבים',scale:'📊 סקאלה',nps:'📈 NPS',radio:'🔘 בחירה אחת',checkbox:'☑️ בחירה מרובה',text:'📝 טקסט'};

function renderEditor(){
  var list=document.getElementById('qList');list.innerHTML='';
  questions.forEach(function(q,i){
    var card=document.createElement('div');card.className='q-card';
    // Head
    var head=document.createElement('div');head.className='q-card-head';
    head.innerHTML='<div class="q-num">'+(i+1)+'</div>';
    var typeSel=document.createElement('select');typeSel.className='q-type-sel';
    Object.keys(TYPE_LABELS).forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=TYPE_LABELS[t];if(t===q.type)o.selected=true;typeSel.appendChild(o);});
    (function(idx){typeSel.onchange=function(){questions[idx].type=this.value;renderEditor();render();};})(i);
    var rm=document.createElement('button');rm.className='q-rm';rm.textContent='✕';
    (function(idx){rm.onclick=function(){questions.splice(idx,1);renderEditor();render();};})(i);
    head.appendChild(typeSel);head.appendChild(rm);card.appendChild(head);

    var fields=document.createElement('div');fields.className='q-fields';
    // Text + icon
    var lbl=document.createElement('label');lbl.textContent='שאלה';fields.appendChild(lbl);
    var ir=document.createElement('div');ir.className='icon-row';
    var ti=document.createElement('input');ti.placeholder='טקסט השאלה...';ti.value=q.text||'';ti.style.flex='1';
    (function(idx){ti.oninput=function(){questions[idx].text=this.value;render();};})(i);
    var icInp=document.createElement('input');icInp.value=q.icon||'';icInp.style.cssText='width:50px;text-align:center;';icInp.placeholder='🎯';
    (function(idx){icInp.oninput=function(){questions[idx].icon=this.value;render();};})(i);
    var icBtn=document.createElement('button');icBtn.className='icon-btn';icBtn.textContent='😀';
    (function(inp){icBtn.onclick=function(e){e.stopPropagation();showIconPicker(inp);};})(icInp);
    ir.appendChild(ti);ir.appendChild(icInp);ir.appendChild(icBtn);fields.appendChild(ir);
    // Subtext
    var si=document.createElement('input');si.placeholder='תיאור (אופציונלי)';si.value=q.subtext||'';
    (function(idx){si.oninput=function(){questions[idx].subtext=this.value;render();};})(i);
    fields.appendChild(si);

    // Type-specific
    if(q.type==='stars'){
      var sl=document.createElement('label');sl.textContent='מספר כוכבים';fields.appendChild(sl);
      var ss=document.createElement('select');ss.style.cssText='width:100px;';
      [3,4,5,6,7,10].forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n+' כוכבים';if(n===(q.stars||5))o.selected=true;ss.appendChild(o);});
      (function(idx){ss.onchange=function(){questions[idx].stars=parseInt(this.value);render();};})(i);
      fields.appendChild(ss);
    }
    if(q.type==='scale'){
      var sl2=document.createElement('label');sl2.textContent='סקאלה וכיתובים';fields.appendChild(sl2);
      var rr=document.createElement('div');rr.className='rating-row';
      var smx=document.createElement('select');smx.style.cssText='width:80px;';
      [5,7,10].forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent='1-'+n;if(n===(q.scaleMax||10))o.selected=true;smx.appendChild(o);});
      (function(idx){smx.onchange=function(){questions[idx].scaleMax=parseInt(this.value);render();};})(i);
      var slo=document.createElement('input');slo.placeholder='נמוך';slo.value=q.scaleLow||'';slo.style.cssText='flex:1;';
      (function(idx){slo.oninput=function(){questions[idx].scaleLow=this.value;render();};})(i);
      var shi=document.createElement('input');shi.placeholder='גבוה';shi.value=q.scaleHigh||'';shi.style.cssText='flex:1;';
      (function(idx){shi.oninput=function(){questions[idx].scaleHigh=this.value;render();};})(i);
      rr.appendChild(smx);rr.appendChild(slo);rr.appendChild(shi);fields.appendChild(rr);
    }
    if(q.type==='text'){
      var pl=document.createElement('input');pl.placeholder='Placeholder...';pl.value=q.placeholder||'';
      (function(idx){pl.oninput=function(){questions[idx].placeholder=this.value;render();};})(i);
      fields.appendChild(pl);
    }
    if(q.type==='radio'||q.type==='checkbox'){
      var ol=document.createElement('label');ol.textContent='אפשרויות';fields.appendChild(ol);
      var optsList=document.createElement('div');optsList.className='opts-list';
      (q.opts||[]).forEach(function(opt,oi){
        var row=document.createElement('div');row.className='opt-row';
        var inp=document.createElement('input');inp.placeholder='אפשרות '+(oi+1);inp.value=opt;
        (function(qi,oidx){inp.oninput=function(){questions[qi].opts[oidx]=this.value;render();};})(i,oi);
        var rmOpt=document.createElement('button');rmOpt.className='opt-rm';rmOpt.textContent='✕';
        (function(qi,oidx){rmOpt.onclick=function(){questions[qi].opts.splice(oidx,1);renderEditor();render();};})(i,oi);
        row.appendChild(inp);row.appendChild(rmOpt);optsList.appendChild(row);
      });
      var addOpt=document.createElement('button');addOpt.className='add-opt';addOpt.textContent='+ הוסף אפשרות';
      (function(idx){addOpt.onclick=function(){if(!questions[idx].opts)questions[idx].opts=[];questions[idx].opts.push('');renderEditor();render();};})(i);
      optsList.appendChild(addOpt);fields.appendChild(optsList);
    }

    // Required
    var reqRow=document.createElement('div');reqRow.className='req-row';
    var rs=document.createElement('span');rs.textContent='שדה חובה';
    var tl=document.createElement('label');tl.className='tog';
    var ti2=document.createElement('input');ti2.type='checkbox';ti2.checked=q.required||false;
    (function(idx){ti2.onchange=function(){questions[idx].required=this.checked;};})(i);
    var tgs=document.createElement('span');tgs.className='togs';
    tl.appendChild(ti2);tl.appendChild(tgs);
    reqRow.appendChild(rs);reqRow.appendChild(tl);fields.appendChild(reqRow);

    card.appendChild(fields);list.appendChild(card);
  });
}

function addQ(type){
  var q={type:type,text:'',icon:'',subtext:'',required:false};
  if(type==='stars')q.stars=5;
  if(type==='scale'){q.scaleMax=10;q.scaleLow='כלל לא';q.scaleHigh='מאוד';}
  if(type==='radio'||type==='checkbox')q.opts=['אפשרות 1','אפשרות 2'];
  if(type==='text')q.placeholder='הכנס תשובה...';
  questions.push(q);
  document.getElementById('addGrid').classList.remove('open');
  renderEditor();render();
}

/* ── PREVIEW ── */
function render(){
  var name=document.getElementById('fName').value||'סקר';
  var icon=document.getElementById('fIcon').value;
  var sub=document.getElementById('fSub').value;
  var time=document.getElementById('fTime').value;
  var btn=document.getElementById('fBtn').value||'שלח ←';
  document.getElementById('actionBtn').textContent=btn;
  var c=document.getElementById('phoneContent');c.innerHTML='';

  var h=document.createElement('div');h.className='pv-title';h.textContent=(icon?icon+' ':'')+name;c.appendChild(h);
  if(sub){var s=document.createElement('div');s.className='pv-sub';s.textContent=sub;c.appendChild(s);}
  if(time){var tb=document.createElement('div');tb.className='pv-time';tb.innerHTML='⏱ זמן משוער: ~'+time+' דק\'';c.appendChild(tb);}

  questions.forEach(function(q,i){
    var card=document.createElement('div');card.className='pv-q';
    if(q.required){var rm=document.createElement('div');rm.className='pv-required';rm.textContent='* שדה חובה';card.appendChild(rm);}
    var title=document.createElement('div');title.className='pv-q-title';
    if(q.icon)title.innerHTML='<span>'+q.icon+'</span>';
    var ts=document.createElement('span');ts.textContent=q.text||'שאלה '+(i+1);title.appendChild(ts);
    card.appendChild(title);
    if(q.subtext){var sd=document.createElement('div');sd.className='pv-q-sub';sd.textContent=q.subtext;card.appendChild(sd);}

    if(q.type==='stars'){
      var stars=document.createElement('div');stars.className='stars';
      for(var s2=1;s2<=(q.stars||5);s2++){
        var star=document.createElement('span');star.className='star'+(s2<=(q.selStar||0)?' active':'');star.textContent='★';
        (function(n,idx){star.onclick=function(){questions[idx].selStar=n;render();};})(s2,i);
        stars.appendChild(star);
      }
      card.appendChild(stars);
    }
    else if(q.type==='scale'){
      var scBtns=document.createElement('div');scBtns.className='scale-btns';
      for(var n=1;n<=(q.scaleMax||10);n++){
        var sb=document.createElement('button');sb.className='scale-btn'+(n===q.selScale?' sel':'');sb.textContent=n;
        (function(val,idx){sb.onclick=function(){questions[idx].selScale=val;render();};})(n,i);
        scBtns.appendChild(sb);
      }
      card.appendChild(scBtns);
      if(q.scaleLow||q.scaleHigh){
        var sl3=document.createElement('div');sl3.className='scale-labels';
        sl3.innerHTML='<span>'+( q.scaleHigh||'')+'</span><span>'+(q.scaleLow||'')+'</span>';
        card.appendChild(sl3);
      }
    }
    else if(q.type==='nps'){
      var npsBtns=document.createElement('div');npsBtns.className='nps-btns';
      for(var n2=0;n2<=10;n2++){
        var nb=document.createElement('button');nb.className='nps-btn'+(n2===q.selNps?' sel':'');nb.textContent=n2;
        (function(val,idx){nb.onclick=function(){questions[idx].selNps=val;render();};})(n2,i);
        npsBtns.appendChild(nb);
      }
      card.appendChild(npsBtns);
      var nl=document.createElement('div');nl.className='scale-labels';nl.innerHTML='<span>בהחלט לא</span><span>בהחלט כן</span>';
      card.appendChild(nl);
    }
    else if(q.type==='radio'||q.type==='checkbox'){
      var choices=document.createElement('div');choices.className='choices';
      (q.opts||[]).forEach(function(opt,oi){
        var item=document.createElement('div');item.className='choice-item'+(Array.isArray(q.selOpts)&&q.selOpts.indexOf(oi)>=0||q.selOpt===oi?' sel':'');
        var indicator;
        if(q.type==='radio'){
          indicator=document.createElement('div');indicator.className='choice-circle';
          var inner=document.createElement('div');inner.className='choice-circle-inner';indicator.appendChild(inner);
          (function(idx,optIdx){item.onclick=function(){questions[idx].selOpt=optIdx;render();};})(i,oi);
        } else {
          indicator=document.createElement('div');indicator.className='choice-square';
          indicator.innerHTML='<svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>';
          (function(idx,optIdx){item.onclick=function(){if(!questions[idx].selOpts)questions[idx].selOpts=[];var pos=questions[idx].selOpts.indexOf(optIdx);if(pos>=0)questions[idx].selOpts.splice(pos,1);else questions[idx].selOpts.push(optIdx);render();};})(i,oi);
        }
        var txt=document.createElement('span');txt.className='choice-text';txt.textContent=opt;
        item.appendChild(indicator);item.appendChild(txt);choices.appendChild(item);
      });
      card.appendChild(choices);
    }
    else if(q.type==='text'){
      var ta=document.createElement('textarea');ta.className='pv-textarea';ta.placeholder=q.placeholder||'';ta.rows=3;
      if(q.required)ta.dataset.required='true';
      card.appendChild(ta);
    }
    c.appendChild(card);
  });
}

function submitForm(){
  var btn=document.getElementById('actionBtn');
  btn.textContent='✓ תודה!';btn.style.background='#2D7A4F';
  toast('✓ הסקר נשלח — תודה!');
}

function updateAssign(){
  var p=document.getElementById('fProcess').value;
  var c=document.getElementById('fStepCur').value;
  var t=document.getElementById('fStepTotal').value;
  var pn={onboarding:'🚀 Onboarding',offboarding:'🚪 Offboarding',lifecycle:'🔄 Life Cycle',''  :'—'};
  var sum=document.getElementById('assignSummary');
  if(p){sum.style.display='block';sum.innerHTML='<strong>תהליך:</strong> '+pn[p]+'<br><strong>שלב:</strong> '+c+' מתוך '+t+'<br><strong>"חזרה לרשימה" →</strong> app.synel.co.il/'+p+'/list';}
  else sum.style.display='none';
  document.getElementById('stepLbl').textContent='שלב '+c+' מתוך '+t;
  var dots=document.getElementById('pbarDots');dots.innerHTML='';
  var tot=parseInt(t)||1,cur=parseInt(c)||1;
  for(var i=1;i<=Math.min(tot,6);i++){var dot=document.createElement('div');dot.className='pdot'+(i===cur?' active':'');dots.appendChild(dot);}
}

function getData(){return{name:document.getElementById('fName').value,icon:document.getElementById('fIcon').value,sub:document.getElementById('fSub').value,time:document.getElementById('fTime').value,btn:document.getElementById('fBtn').value,process:document.getElementById('fProcess').value,stepCur:document.getElementById('fStepCur').value,stepTotal:document.getElementById('fStepTotal').value,questions:questions.map(function(q){return Object.assign({},q);}),savedAt:new Date().toISOString()};}
function exportJSON(){
  var d = getData();
  var json = {
    formType: 'survey',
    meta: {
      name: d.name, icon: d.icon||'', subtitle: d.sub||'',
      estimatedTime: parseInt(d.time)||2,
      process: d.process||'', stepCurrent: parseInt(d.stepCur)||1,
      stepTotal: parseInt(d.stepTotal)||6, owner: d.owner||'',
      exportedAt: new Date().toISOString(),
    },
    completion: { actionButton: d.btn||'', hasSignature: d.hasSig||false },
    questions: (d.questions||[]).map(function(q){
      return {
        type: q.type, text: q.text, icon: q.icon||'',
        options: q.options||[], scale: q.scale||null,
        dbField: q.dbField||'', filler: q.filler||'E_', required: q.required!==false,
      };
    }),
  };
  var blob=new Blob([JSON.stringify(json,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(d.name||'survey').replace(/\s+/g,'_')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('JSON יוצא: '+(d.name||'survey')+'.json');
}

function saveForm(){var data=getData();try{localStorage.setItem('survey_'+data.name,JSON.stringify(data));}catch(e){}toast('✓ נשמר: "'+data.name+'"');}
function saveAs(){document.getElementById('saveAsName').value=document.getElementById('fName').value+' — עותק';document.getElementById('saveAsModal').style.display='flex';setTimeout(function(){document.getElementById('saveAsName').select();},50);}
function confirmSaveAs(){var n=document.getElementById('saveAsName').value.trim();if(!n)return;document.getElementById('fName').value=n;render();saveForm();document.getElementById('saveAsModal').style.display='none';toast('✓ נשמר בשם: "'+n+'"');}
function openLoad(){
  var sl=document.getElementById('savedList');sl.innerHTML='';
  var keys=[];try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('survey_'))keys.push(k);}}catch(e){}
  if(!keys.length){sl.innerHTML='<div style="font-size:12px;color:#9CA3AF;text-align:center;padding:12px;">אין סקרים שמורים</div>';}
  else keys.forEach(function(k){
    try{var d=JSON.parse(localStorage.getItem(k));var row=document.createElement('div');row.className='saved-item';
      var info=document.createElement('div');info.style.flex='1';
      var nm=document.createElement('div');nm.style.cssText='font-size:13px;font-weight:500;';nm.textContent=d.name||k;
      var mt=document.createElement('div');mt.style.cssText='font-size:10px;color:#9CA3AF;';mt.textContent=(d.questions||[]).length+' שאלות';
      info.appendChild(nm);info.appendChild(mt);
      var lb=document.createElement('button');lb.className='si-load';lb.textContent='טען';
      (function(dat){lb.onclick=function(){loadForm(dat);document.getElementById('loadModal').style.display='none';};})(d);
      var db=document.createElement('button');db.className='si-del';db.textContent='מחק';
      (function(key){db.onclick=function(){if(confirm('למחוק?')){localStorage.removeItem(key);openLoad();}};})(k);
      row.appendChild(info);row.appendChild(lb);row.appendChild(db);sl.appendChild(row);
    }catch(ex){}
  });
  document.getElementById('loadModal').style.display='flex';
}
function loadForm(data){
  document.getElementById('fName').value=data.name||'';document.getElementById('fIcon').value=data.icon||'';
  document.getElementById('fSub').value=data.sub||'';document.getElementById('fTime').value=data.time||'';
  document.getElementById('fBtn').value=data.btn||'שלח ←';document.getElementById('fProcess').value=data.process||'';
  document.getElementById('fStepCur').value=data.stepCur||'1';document.getElementById('fStepTotal').value=data.stepTotal||'6';
  questions=data.questions||[];updateAssign();renderEditor();render();toast('✓ נטען: "'+data.name+'"');
}

var ICON_SETS={'כללי':['✅','❌','⚠️','ℹ️','🔔','📌','🔑','⭐','💡','🎯','✨','🔥'],'עבודה':['💼','📁','📄','📝','📋','📊','🖥️','💻','📱'],'אנשים':['👤','👥','🤝','👋','🙌'],'סימנים':['✓','✗','→','★','•']};
function showIconPicker(inputEl){
  var ex=document.getElementById('iconPickerPanel');if(ex){if(ex._forInput===inputEl){ex.remove();return;}ex.remove();}
  var panel=document.createElement('div');panel.id='iconPickerPanel';panel._forInput=inputEl;
  panel.style.cssText='position:fixed;background:white;border:1px solid #E5E7EB;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:500;width:260px;max-height:280px;display:flex;flex-direction:column;overflow:hidden;direction:rtl;font-family:sans-serif;';
  var head=document.createElement('div');head.style.cssText='padding:8px 12px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;';
  head.innerHTML='<span style="font-size:12px;font-weight:600;color:#374151;">בחר אייקון</span>';
  var cl=document.createElement('button');cl.textContent='✕';cl.style.cssText='border:none;background:none;cursor:pointer;font-size:13px;color:#9CA3AF;';cl.onclick=function(){panel.remove();};
  head.appendChild(cl);panel.appendChild(head);
  var body=document.createElement('div');body.style.cssText='flex:1;overflow-y:auto;padding:8px;';
  Object.keys(ICON_SETS).forEach(function(cat){
    var ct=document.createElement('div');ct.style.cssText='font-size:10px;font-weight:600;color:#9CA3AF;letter-spacing:.04em;text-transform:uppercase;margin:6px 2px 4px;';ct.textContent=cat;body.appendChild(ct);
    var grid=document.createElement('div');grid.style.cssText='display:flex;flex-wrap:wrap;gap:3px;';
    ICON_SETS[cat].forEach(function(icon){
      var btn=document.createElement('button');btn.textContent=icon;btn.style.cssText='width:30px;height:30px;border:1px solid #E5E7EB;border-radius:6px;background:none;cursor:pointer;font-size:16px;';
      btn.onclick=function(){inputEl.value=icon;inputEl.dispatchEvent(new Event('input'));panel.remove();};
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  });
  panel.appendChild(body);document.body.appendChild(panel);
  var rect=inputEl.getBoundingClientRect();var top=rect.bottom+4;if(top+280>window.innerHeight)top=rect.top-284;
  panel.style.top=Math.max(4,top)+'px';var left=rect.right-260;if(left<4)left=4;panel.style.left=left+'px';
  setTimeout(function(){document.addEventListener('click',function h(e){if(!panel.contains(e.target)&&e.target!==inputEl){panel.remove();document.removeEventListener('click',h);}});},100);
}

var tt=null;
function toast(msg){var t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2500);}

updateAssign();renderEditor();render();

/* DB MAPPING */
var dbMappings = [];
function addDBMapping(){
  dbMappings.push({fieldName:'', dbField:'', filler:'E_'});
  renderDBMappings();
}
function renderDBMappings(){
  var list = document.getElementById('dbMappingList');
  if(!list) return;
  list.innerHTML = '';
  dbMappings.forEach(function(m, i){
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:4px;align-items:center;background:#FAFAFA;border:1px solid #E5E7EB;border-radius:8px;padding:6px 8px;';
    var fnInp = document.createElement('input');
    fnInp.placeholder = 'שם שדה בטופס';
    fnInp.value = m.fieldName||'';
    fnInp.style.cssText = 'flex:1;padding:4px 6px;font-size:11px;border:1px solid #E5E7EB;border-radius:5px;font-family:inherit;outline:none;';
    (function(idx){fnInp.oninput=function(){dbMappings[idx].fieldName=this.value;};})(i);
    var dbSel = document.createElement('select');
    dbSel.style.cssText = 'flex:1;padding:4px 5px;font-size:11px;border:1px solid #C7D2FE;border-radius:5px;font-family:inherit;outline:none;background:#EEF2FF;color:#4338CA;';
    var empty = document.createElement('option');empty.value='';empty.textContent='-- DB --';dbSel.appendChild(empty);
    if(typeof SYNEL_DB_FIELDS!=='undefined'){
      var cats={};
      SYNEL_DB_FIELDS.forEach(function(f){if(!cats[f.category])cats[f.category]=[];cats[f.category].push(f);});
      Object.keys(cats).forEach(function(cat){
        var og=document.createElement('optgroup');og.label=cat;
        cats[cat].forEach(function(f){var o=document.createElement('option');o.value=f.dbField;o.textContent=f.labelHe;if(f.dbField===m.dbField)o.selected=true;og.appendChild(o);});
        dbSel.appendChild(og);
      });
    }
    (function(idx){dbSel.onchange=function(){dbMappings[idx].dbField=this.value;};})(i);
    var fillerSel = document.createElement('select');
    fillerSel.style.cssText = 'padding:4px 5px;font-size:11px;border:1px solid #E5E7EB;border-radius:5px;font-family:inherit;outline:none;';
    [{v:'E_',l:'E'},{v:'M_',l:'M'},{v:'S_',l:'S'}].forEach(function(opt){var o=document.createElement('option');o.value=opt.v;o.textContent=opt.l;if(opt.v===m.filler)o.selected=true;fillerSel.appendChild(o);});
    (function(idx){fillerSel.onchange=function(){dbMappings[idx].filler=this.value;};})(i);
    var rm = document.createElement('button');rm.textContent='x';rm.style.cssText='width:22px;height:22px;border-radius:50%;border:1px solid #E5E7EB;background:none;cursor:pointer;color:#9CA3AF;font-size:10px;flex-shrink:0;';
    (function(idx){rm.onclick=function(){dbMappings.splice(idx,1);renderDBMappings();};})(i);
    row.appendChild(fnInp);row.appendChild(dbSel);row.appendChild(fillerSel);row.appendChild(rm);
    list.appendChild(row);
  });
}
