<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עורך תבנית הצגת מידע מ-DB</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F5F5F0;--surface:#fff;--border:#E5E7EB;--text:#1a1a1a;--text2:#6B7280;--text3:#9CA3AF;--accent:#4F46E5;--green:#2D7A4F;--orange:#E8603C;--red:#DC2626;--r:12px;}
body{font-family:'Helvetica Neue',Arial,sans-serif;direction:rtl;background:var(--bg);min-height:100vh;display:flex;}

/* EDITOR */
.editor-panel{width:380px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.ep-head{padding:16px 18px;border-bottom:1px solid var(--border);background:#FAFAFA;}
.ep-head h2{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ep-head p{font-size:11px;color:var(--text3);}
.ep-body{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.ep-sec label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px;}
.ep-inp{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;color:var(--text);outline:none;background:#FAFAFA;}
.ep-inp:focus{border-color:var(--accent);background:var(--surface);}
.ep-ta{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;color:var(--text);outline:none;background:#FAFAFA;resize:none;}
.ep-ta:focus{border-color:var(--accent);background:var(--surface);}
.divider{height:1px;background:var(--border);}
.icon-row{display:flex;gap:4px;}
.icon-row input{flex:1;}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:16px;flex-shrink:0;}

/* Sections list */
.sec-list{display:flex;flex-direction:column;gap:8px;}
.sec-card{background:#FAFAFA;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sec-card-head{padding:9px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:white;}
.sec-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sec-type-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#EEF2FF;color:var(--accent);}
.sec-rm{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center;margin-right:auto;}
.sec-rm:hover{background:#FEE2E2;color:var(--red);border-color:#FECACA;}
.sec-fields{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.sec-fields label{font-size:11px;color:var(--text2);}
.sec-fields input,.sec-fields select,.sec-fields textarea{width:100%;padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;outline:none;background:white;color:var(--text);}
.sec-fields input:focus,.sec-fields select:focus,.sec-fields textarea:focus{border-color:var(--accent);}
/* DB rows */
.db-rows{display:flex;flex-direction:column;gap:4px;}
.db-row{display:flex;gap:4px;}
.db-row input{flex:1;padding:5px 9px;font-size:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;outline:none;background:white;}
.db-row-rm{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:11px;}
.db-row-rm:hover{background:#FEE2E2;color:var(--red);}
.add-db-row{padding:4px 10px;font-size:11px;border:1px dashed #C7D2FE;border-radius:8px;background:none;color:var(--accent);cursor:pointer;font-family:inherit;margin-top:2px;}

/* Toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between;}
.tog-row span{font-size:11px;color:var(--text2);}
.tog{position:relative;display:inline-block;width:30px;height:17px;cursor:pointer;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.togs{position:absolute;inset:0;border-radius:17px;background:#D1D5DB;transition:.15s;}
.togs:before{content:'';position:absolute;height:11px;width:11px;right:3px;top:3px;background:white;border-radius:50%;transition:.15s;}
.tog input:checked+.togs{background:var(--accent);}
.tog input:checked+.togs:before{transform:translateX(-13px);}

/* Add section picker */
.add-q-wrap{display:flex;flex-direction:column;gap:5px;}
.add-type-grid{display:none;flex-wrap:wrap;gap:5px;}
.add-type-grid.open{display:flex;}
.at-btn{padding:5px 11px;font-size:11px;border:1px solid var(--border);border-radius:20px;background:white;cursor:pointer;font-family:inherit;color:var(--text2);}
.at-btn:hover{border-color:var(--accent);color:var(--accent);}
.add-btn{width:100%;padding:8px;font-size:12px;border:1.5px dashed #C7D2FE;border-radius:var(--r);background:none;color:var(--accent);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
.add-btn:hover{background:var(--accent);color:white;border-color:var(--accent);}

.ep-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
.btn{flex:1;padding:9px;font-size:12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-weight:500;}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn.primary:hover{background:#4338CA;}

/* PREVIEW */
.preview-panel{flex:1;background:var(--bg);padding:24px;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;}
.phone-wrap{width:375px;background:var(--surface);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column;}
.phone-bar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;}
.pbar-step{font-size:11px;color:var(--text3);}
.pbar-dots{display:flex;gap:4px;margin-right:auto;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.pdot.active{background:var(--accent);}
.phone-scroll{flex:1;overflow-y:auto;padding:20px 16px 8px;}
.pv-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:3px;}
.pv-sub{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.pv-time{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#F5F5F0;border-radius:20px;font-size:12px;color:var(--text2);margin-bottom:16px;border:1px solid var(--border);}

/* Info sections in preview */
.pv-section{background:#F8F8F6;border-radius:14px;padding:16px;margin-bottom:10px;}
.pv-sec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;}
.pv-db-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px;}
.pv-db-row:last-child{border-bottom:none;}
.pv-db-label{color:var(--text2);}
.pv-db-value{font-weight:600;color:var(--text);}
.pv-info-bubble{background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400E;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;}
.pv-text-sec{font-size:13px;color:var(--text);line-height:1.7;}
.pv-text-sec strong{font-weight:700;}
.pv-doc-btn{width:100%;padding:13px;font-size:14px;border:1.5px solid var(--red);border-radius:12px;background:#FEF2F2;color:var(--red);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;}
.pv-doc-btn:hover{background:#FEE2E2;}
.pv-scroll-hint{font-size:11px;color:var(--amber,#D97706);background:#FFFBEB;border:1px solid #FCD34D;border-radius:8px;padding:7px 12px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* Read confirm */
.pv-read-confirm{border:1.5px solid var(--green);border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:10px;transition:all .15s;}
.pv-read-confirm:hover{background:#F0FDF4;}
.pv-rc-check{width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;flex-shrink:0;}
.pv-rc-text{font-size:14px;font-weight:500;color:var(--green);}

/* Signature */
.pv-sig-box{background:#F8F8F6;border-radius:14px;padding:16px;margin-bottom:10px;}
.pv-sig-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.pv-sig-sub{font-size:12px;color:var(--text3);margin-bottom:10px;}
.sig-canvas-wrap{border:1px solid var(--border);border-radius:10px;background:white;overflow:hidden;margin-bottom:8px;}
.sig-canvas{width:100%;height:120px;cursor:crosshair;display:block;}
.sig-btns{display:flex;gap:8px;}
.sig-clear{flex:1;padding:9px;font-size:13px;border:1px solid var(--border);border-radius:10px;background:white;cursor:pointer;font-family:inherit;}
.sig-done{flex:1;padding:9px;font-size:13px;border:none;border-radius:10px;background:#ECFDF5;color:var(--green);cursor:pointer;font-family:inherit;font-weight:600;display:none;}
.sig-done.show{display:block;}
.sig-note{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;}

.phone-footer{padding:12px 16px 20px;border-top:1px solid var(--border);}
.pv-action-btn{width:100%;padding:16px;font-size:16px;font-weight:600;border-radius:50px;border:none;background:var(--orange);color:white;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.pv-back{display:block;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-box{background:white;border-radius:14px;padding:22px 24px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.15);}
.modal-box h3{font-size:14px;font-weight:600;margin-bottom:12px;}
.modal-inp{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:10px;font-family:inherit;outline:none;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.m-cancel{flex:1;padding:8px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-family:inherit;}
.m-ok{flex:1;padding:8px;font-size:13px;border-radius:10px;border:none;background:var(--accent);color:white;cursor:pointer;font-family:inherit;font-weight:500;}
.saved-list{max-height:200px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
.saved-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;}
.si-load{padding:3px 10px;font-size:11px;border-radius:20px;border:none;background:var(--accent);color:white;cursor:pointer;}
.si-del{padding:3px 8px;font-size:11px;border-radius:20px;border:1px solid #FECACA;background:#FEF2F2;color:var(--red);cursor:pointer;}

.toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:#111;color:white;font-size:12px;padding:7px 18px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
<script src="synel-db.js"></script>
<script src="synel-validation.js"></script>
<script src="synel-autosave.js"></script>
<script src="synel-accessibility.js"></script>
<script src="synel-versions.js"></script>
<script src="synel-mobile.js"></script>
<script src="synel-brand.js"></script>
<script src="synel-nav.js"></script>
<script src="synel-publish.js"></script>
</head>
<body>

<div class="editor-panel">
  <div class="ep-head">
    <h2>🗄 עורך תבנית הצגת מידע</h2>
    <p>נתוני DB + מסמך + אישור קריאה + חתימה</p>
  </div>
  <div class="ep-body">

    <div class="ep-sec">
      <label>שם הטופס</label>
      <div class="icon-row">
        <input class="ep-inp" id="fName" value="טופס 161 — גמר חשבון" oninput="render()">
        <button class="icon-btn" onclick="showIconPicker(document.getElementById('fIcon'))">😀</button>
        <input class="ep-inp" id="fIcon" style="width:50px;text-align:center;" placeholder="📄" oninput="render()">
      </div>
    </div>
    <div class="ep-sec">
      <label>תת-כותרת</label>
      <input class="ep-inp" id="fSub" value="סקרי את הנתונים שנשלפו מהמערכת. לאחר חתימה, הקובץ יישלח למייל האישי שלך." oninput="render()">
    </div>
    <div class="ep-sec">
      <label>זמן משוער (דקות)</label>
      <input class="ep-inp" id="fTime" value="2" style="width:80px;" oninput="render()">
    </div>

    <div class="divider"></div>

    <div class="ep-sec">
      <label>סעיפי תוכן</label>
      <div class="sec-list" id="secList"></div>
      <div class="add-q-wrap">
        <div class="add-type-grid" id="addGrid">
          <button class="at-btn" onclick="addSec('db')">🗄 שורות DB</button>
          <button class="at-btn" onclick="addSec('text')">📝 טקסט חופשי</button>
          <button class="at-btn" onclick="addSec('info')">ℹ️ בועית מידע</button>
          <button class="at-btn" onclick="addSec('doc')">📄 כפתור מסמך</button>
        </div>
        <button class="add-btn" onclick="document.getElementById('addGrid').classList.toggle('open')">+ הוסף סעיף</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="ep-sec">
      <label>הגדרות סוף מסמך</label>
      <div class="tog-row" style="margin-bottom:8px;">
        <span>אישור קריאה</span>
        <label class="tog"><input type="checkbox" id="hasReadConfirm" checked onchange="render()"><span class="togs"></span></label>
      </div>
      <input class="ep-inp" id="readConfirmText" value="קראתי והבנתי את המסמך המלא" oninput="render()" style="margin-bottom:8px;">
      <div class="tog-row" style="margin-bottom:8px;">
        <span>חתימה דיגיטלית</span>
        <label class="tog"><input type="checkbox" id="hasSignature" checked onchange="render()"><span class="togs"></span></label>
      </div>
      <div class="tog-row">
        <span>כפתור צפייה במסמך המלא</span>
        <label class="tog"><input type="checkbox" id="hasDocBtn" checked onchange="render()"><span class="togs"></span></label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="ep-sec">
      <label>טקסט כפתור</label>
      <input class="ep-inp" id="fBtn" value="אישור והמשך ←" oninput="render()">
    </div>
    <div class="ep-sec">
      <label>שיוך לתהליך</label>
      <select class="ep-inp" id="fProcess" onchange="updateAssign()">
        <option value="">— בחר —</option>
        <option value="onboarding">🚀 Onboarding</option>
        <option value="offboarding" selected>🚪 Offboarding</option>
        <option value="lifecycle">🔄 Life Cycle</option>
      </select>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <label style="font-size:11px;color:var(--text2);">שלב</label>
      <input class="ep-inp" id="fStepCur" type="number" value="4" style="width:55px;" oninput="updateAssign()">
      <span style="font-size:12px;color:var(--text3);">מתוך</span>
      <input class="ep-inp" id="fStepTotal" type="number" value="6" style="width:55px;" oninput="updateAssign()">
    </div>
    <div id="assignSummary" style="display:none;background:#F0FDF4;border:1px solid #A7F3D0;border-radius:10px;padding:10px 12px;font-size:11px;color:#065F46;line-height:1.8;"></div>

  </div>
  
    <div class="divider"></div>

    <div class="ep-sec">
      <label>עובד אחראי</label>
      <select class="ep-inp" id="fOwner" onchange="updateAssign && updateAssign()">
        <option value="">-- לא הוגדר --</option>
        <option value="hr">HR</option>
        <option value="manager">מנהל ישיר</option>
        <option value="it">IT</option>
        <option value="payroll">חשב שכר</option>
      </select>
    </div>
  
    <div class="divider"></div>

    <div class="ep-sec">
      <label>אישור סיום</label>
      <div class="tog-row" style="margin-bottom:6px;">
        <span>חתימה דיגיטלית</span>
        <label class="tog"><input type="checkbox" id="hasSigOpt" onchange="updateConfirmType()"><span class="togs"></span></label>
      </div>
      <div class="tog-row">
        <span>צ'קבוקס "קראתי והבנתי"</span>
        <label class="tog"><input type="checkbox" id="hasCheckOpt" checked onchange="updateConfirmType()"><span class="togs"></span></label>
      </div>
      <input class="ep-inp" id="confirmOptText" value="קראתי והבנתי" oninput="updateConfirmType()" style="margin-top:6px;">
    </div>
  <div class="ep-footer">
    <button class="btn" onclick="saveForm()">💾 שמור</button>
    <button class="btn" onclick="saveAs()">📋 שמור בשם</button>
    <button class="btn" style="width:100%;background:#1e1b4b;color:white;border-color:#1e1b4b;" onclick="exportJSON()">{ } ייצא JSON</button>
    <button class="btn" style="width:100%;font-size:11px;" onclick="openLoad()">📂 טפסים שמורים</button>
  </div>
</div>

<div class="preview-panel">
  <div class="phone-wrap">
    <div class="phone-bar">
      <span class="pbar-step" id="stepLbl">שלב 4 מתוך 6</span>
      <div class="pbar-dots" id="pbarDots"></div>
    </div>
    <div class="phone-scroll" id="phoneContent"></div>
    <div class="phone-footer">
      <button class="pv-action-btn" id="actionBtn" onclick="submitForm()">אישור והמשך ←</button>
      <span class="pv-back">חזרה לרשימה</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="saveAsModal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box"><h3>📋 שמור בשם</h3>
    <input class="modal-inp" id="saveAsName" onkeydown="if(event.key==='Enter')confirmSaveAs()">
    <div class="modal-btns"><button class="m-cancel" onclick="document.getElementById('saveAsModal').style.display='none'">ביטול</button><button class="m-ok" onclick="confirmSaveAs()">שמור ✓</button></div>
  </div>
</div>
<div class="modal-overlay" id="loadModal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box" style="width:400px;"><h3>📂 טפסים שמורים</h3>
    <div class="saved-list" id="savedList"></div>
    <button class="m-cancel" style="width:100%;" onclick="document.getElementById('loadModal').style.display='none'">סגור</button>
  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
var sections=[
  {type:'db', title:'א. נתוני שכר', rows:[
    {label:'ברוטו חודש אחרון', value:'18,000', type:'currency', dbField:'last_gross'},
    {label:'פיצויי פיטורין',   value:'24,500', type:'currency', dbField:'severance'},
    {label:'יתרת ימי חופשה',   value:'12',     type:'days',    dbField:'vacation_days'},
    {label:'יתרת ימי מחלה',    value:'4',      type:'days',    dbField:'sick_days'},
    {label:'מועד שחרור פנסיה/קופות', value:'15 ביוני 2026', type:'date_calc', dbField:'pension_release_date', calcFormula:'termination_date + 30d'},
  ]},
  {type:'info', title:'', text:'הנתונים נשלפים אוטומטית מהמערכת. במידה ויש אי-התאמה, פני לחשב השכר לפני החתימה.'},
  {type:'doc',  title:'', btnText:'צפייה במסמך המלא 📄', btnNote:'יש לפתוח ולגלול את המסמך המלא לפני החתימה'},
  {type:'text', title:'ג. קופות גמל ופנסיה', content:'הכספים יועמדו לרשות העובדת ביום 15 ביוני 2026.\n\n**ד. אישורים**\nאני מאשרת כי קיבלתי את כל המגיע לי עבור תקופת עבודתי בסינאל בע"מ.'},
];

var SEC_LABELS={db:'🗄 שורות DB',text:'📝 טקסט',info:'ℹ️ בועית מידע',doc:'📄 כפתור מסמך'};

function renderEditor(){
  var list=document.getElementById('secList');list.innerHTML='';
  sections.forEach(function(sec,i){
    var card=document.createElement('div');card.className='sec-card';
    var head=document.createElement('div');head.className='sec-card-head';
    head.innerHTML='<div class="sec-num">'+(i+1)+'</div><span class="sec-type-badge">'+SEC_LABELS[sec.type]+'</span>';
    var rm=document.createElement('button');rm.className='sec-rm';rm.textContent='✕';

function render(){
  var name=document.getElementById('fName').value||'טופס';

  var sub=document.getElementById('fSub').value;
  var time=document.getElementById('fTime').value;

          vl.style.color='#1D4ED8';
        } else if(type==='days'){
          displayed=raw+(raw.indexOf('ימ')<0?' ימים':'');
        } else if(type==='date'||type==='date_calc'){
          displayed=raw;
          vl.style.color='#7C3AED';
          if(type==='date_calc'){
            var calcNote=document.createElement('span');
            calcNote.style.cssText='font-size:10px;color:#9CA3AF;margin-right:4px;';
            calcNote.textContent='🧮';
            vl.appendChild(calcNote);
          }
        } else if(type==='percent'){
          displayed=raw+(raw.indexOf('%')<0?'%':'');
        } else if(type==='boolean'){
          displayed=raw==='true'||raw==='כן'?'✓ כן':'✗ לא';
          vl.style.color=displayed.startsWith('✓')?'#059669':'#DC2626';
        } else {
          displayed=raw;
        }
        vl.appendChild(document.createTextNode(displayed));
        rr.appendChild(lb);rr.appendChild(vl);box.appendChild(rr);
      });
      c.appendChild(box);
    }
    else if(sec.type==='info'){
      var ib=document.createElement('div');ib.className='pv-info-bubble';
      ib.innerHTML='<span>ℹ️</span><span>'+xe(sec.text||'')+'</span>';
      c.appendChild(ib);
    }
    else if(sec.type==='doc'){
      if(sec.btnNote){var hint=document.createElement('div');hint.className='pv-scroll-hint';hint.innerHTML='⚠️ '+xe(sec.btnNote);c.appendChild(hint);}
      var db=document.createElement('button');db.className='pv-doc-btn';
      db.textContent=sec.btnText||'צפייה במסמך המלא 📄';
      db.onclick=function(){toast('פותח מסמך...');};
      c.appendChild(db);
    }
    else if(sec.type==='text'){
      var tb2=document.createElement('div');tb2.className='pv-section';
      if(sec.title){var st2=document.createElement('div');st2.className='pv-sec-title';st2.textContent=sec.title;tb2.appendChild(st2);}
      var content=document.createElement('div');content.className='pv-text-sec';
      content.innerHTML=(sec.content||'').split('\n').map(function(line){
        return line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      }).join('<br>');
      tb2.appendChild(content);
      c.appendChild(tb2);
    }
  });

  // Read confirm
  if(hasRC){
    var scroll=document.createElement('div');scroll.style.cssText='font-size:11px;color:var(--green);text-align:left;margin-bottom:8px;padding:0 2px;';
    scroll.innerHTML='✓ הגעת לסוף המסמך – ניתן עכשיו לחתום';
    c.appendChild(scroll);
    var rc=document.createElement('div');rc.className='pv-read-confirm';
    rc.innerHTML='<div class="pv-rc-check">✓</div><div class="pv-rc-text">'+xe(rcText)+'</div>';
    rc.onclick=function(){rc.style.background='#F0FDF4';toast('אישור קריאה נרשם ✓');};
    c.appendChild(rc);
  }

  // Signature
  if(hasSig){
    var sigBox=document.createElement('div');sigBox.className='pv-sig-box';
    sigBox.innerHTML='<div class="pv-sig-title">חתימה דיגיטלית</div>'
      +'<div class="pv-sig-sub">חתמי באצבע או עכבר</div>';
    var canvasWrap=document.createElement('div');canvasWrap.className='sig-canvas-wrap';
    var canvas=document.createElement('canvas');canvas.className='sig-canvas';canvas.width=343;canvas.height=120;
    canvasWrap.appendChild(canvas);sigBox.appendChild(canvasWrap);
    var sigBtns=document.createElement('div');sigBtns.className='sig-btns';
    var clearBtn=document.createElement('button');clearBtn.className='sig-clear';clearBtn.textContent='ניקוי';
    var doneBtn=document.createElement('button');doneBtn.className='sig-done';doneBtn.textContent='✓ חתימה נקלטה';
    sigBtns.appendChild(doneBtn);sigBtns.appendChild(clearBtn);
    sigBox.appendChild(sigBtns);
    var note=document.createElement('div');note.className='sig-note';note.textContent='עותק חתום נשלח למייל האישי שלך';
    sigBox.appendChild(note);
    c.appendChild(sigBox);

    // Setup canvas drawing
    setTimeout(function(){
      var ctx=canvas.getContext('2d');
      ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.lineCap='round';
      var drawing=false;
      function getPos(e){
        var r=canvas.getBoundingClientRect();
        var src=e.touches?e.touches[0]:e;
        return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
      }
      canvas.onmousedown=canvas.ontouchstart=function(e){e.preventDefault();drawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
      canvas.onmousemove=canvas.ontouchmove=function(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();};
      canvas.onmouseup=canvas.ontouchend=function(){drawing=false;doneBtn.classList.add('show');};
      clearBtn.onclick=function(){ctx.clearRect(0,0,canvas.width,canvas.height);doneBtn.classList.remove('show');};
    },50);
  }
}

function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getData(){return{name:document.getElementById('fName').value,icon:document.getElementById('fIcon').value,sub:document.getElementById('fSub').value,time:document.getElementById('fTime').value,btn:document.getElementById('fBtn').value,hasReadConfirm:document.getElementById('hasReadConfirm').checked,readConfirmText:document.getElementById('readConfirmText').value,hasSignature:document.getElementById('hasSignature').checked,hasDocBtn:document.getElementById('hasDocBtn').checked,process:document.getElementById('fProcess').value,stepCur:document.getElementById('fStepCur').value,stepTotal:document.getElementById('fStepTotal').value,sections:sections.map(function(s){return Object.assign({},s,{rows:s.rows?s.rows.map(function(r){return Object.assign({},r);}):undefined});}),savedAt:new Date().toISOString()};}
function exportJSON(){
  var d = getData();
  var json = {
    formType: 'info-db',
    meta: {
      name: d.name, subtitle: d.sub||'',
      estimatedTime: parseInt(d.time)||2,
      process: d.process||'', stepCurrent: parseInt(d.stepCur)||1,
      stepTotal: parseInt(d.stepTotal)||6, owner: d.owner||'',
      exportedAt: new Date().toISOString(),
    },
    completion: {
      actionButton: d.btn||'',
      hasSignature: d.hasSig||false,
      hasReadConfirm: d.hasRC||false,
      readConfirmText: d.rcText||'',
    },
    sections: (d.sections||[]).map(function(sec){
      return {
        type: sec.type,
        title: sec.title||'',
        rows: (sec.rows||[]).map(function(row){
          return {
            label: row.label,
            value: row.value||'',
            dbField: row.dbField||'',
            filler: row.filler||'',
            type: row.type||'text',
            readonly: row.readonly||false,
          };
        }),
      };
    }),
  };
  var blob=new Blob([JSON.stringify(json,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(d.name||'info-db').replace(/\s+/g,'_')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('JSON יוצא: '+(d.name||'info-db')+'.json');
}

function openLoad(){
  var sl=document.getElementById('savedList');sl.innerHTML='';
  var keys=[];try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('info_'))keys.push(k);}}catch(e){}
  if(!keys.length){sl.innerHTML='<div style="font-size:12px;color:#9CA3AF;text-align:center;padding:12px;">אין טפסים שמורים</div>';}
  else keys.forEach(function(k){
    try{var d=JSON.parse(localStorage.getItem(k));var row=document.createElement('div');row.className='saved-item';
      var info=document.createElement('div');info.style.flex='1';
      var nm=document.createElement('div');nm.style.cssText='font-size:13px;font-weight:500;';nm.textContent=d.name||k;
      var mt=document.createElement('div');mt.style.cssText='font-size:10px;color:#9CA3AF;';mt.textContent=(d.sections||[]).length+' סעיפים';
      info.appendChild(nm);info.appendChild(mt);
      var lb=document.createElement('button');lb.className='si-load';lb.textContent='טען';
      (function(dat){lb.onclick=function(){loadForm(dat);document.getElementById('loadModal').style.display='none';};})(d);
      var db2=document.createElement('button');db2.className='si-del';db2.textContent='מחק';
      (function(key){db2.onclick=function(){if(confirm('למחוק?')){localStorage.removeItem(key);openLoad();}};})(k);
      row.appendChild(info);row.appendChild(lb);row.appendChild(db2);sl.appendChild(row);
    }catch(ex){}
  });
  document.getElementById('loadModal').style.display='flex';
}

  head.appendChild(cl);panel.appendChild(head);
  var body=document.createElement('div');body.style.cssText='flex:1;overflow-y:auto;padding:8px;';
  Object.keys(ICON_SETS).forEach(function(cat){
    var ct=document.createElement('div');ct.style.cssText='font-size:10px;font-weight:600;color:#9CA3AF;margin:5px 2px 3px;';ct.textContent=cat;body.appendChild(ct);
    var grid=document.createElement('div');grid.style.cssText='display:flex;flex-wrap:wrap;gap:3px;';
    ICON_SETS[cat].forEach(function(icon){var btn=document.createElement('button');btn.textContent=icon;btn.style.cssText='width:30px;height:30px;border:1px solid #E5E7EB;border-radius:6px;background:none;cursor:pointer;font-size:16px;';btn.onclick=function(){inputEl.value=icon;inputEl.dispatchEvent(new Event('input'));panel.remove();};grid.appendChild(btn);});
    body.appendChild(grid);
  });
  panel.appendChild(body);document.body.appendChild(panel);
  var rect=inputEl.getBoundingClientRect();var top=rect.bottom+4;if(top+250>window.innerHeight)top=rect.top-254;
  panel.style.top=Math.max(4,top)+'px';var left=rect.right-250;if(left<4)left=4;panel.style.left=left+'px';
  setTimeout(function(){document.addEventListener('click',function h(e){if(!panel.contains(e.target)&&e.target!==inputEl){panel.remove();document.removeEventListener('click',h);}});},100);
}

var tt=null;
function toast(msg){var t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2500);}

updateAssign();renderEditor();render();
</script>

(function(){var m=location.search.match(/[?&]load=([^&]+)/);if(!m)return;var key="info_"+decodeURIComponent(m[1]);function go(){try{var raw=localStorage.getItem(key);if(!raw)return;var d=JSON.parse(raw);if(typeof loadForm==='function')loadForm(d);}catch(e){}}if(document.readyState==='complete')setTimeout(go,350);else window.addEventListener('load',function(){setTimeout(go,350);});})();</script>
